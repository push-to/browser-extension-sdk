name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to (re)publish to npm, e.g. v0.0.16. Recovery path for releases that were tagged but failed to publish.'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      # npm >= 11.5.1 is required for OIDC trusted publishing (no NPM_TOKEN).
      # The npmjs.com trusted publisher for @push-to/chrome-extension must
      # reference this repo + this workflow file (release.yml).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build
        env:
          PUSHTO_CORE_URL: ${{ secrets.PUSHTO_CORE_URL }}

      - name: Run tests
        run: |
          # Only run tests if test files exist in packages directory
          if find packages -type f \( -name "*.test.*" -o -name "*.spec.*" \) 2>/dev/null | grep -q .; then
            bun test
          else
            echo "No test files found in packages directory, skipping..."
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

  # Manual recovery: publish an already-tagged version whose npm publish failed
  # (semantic-release skips tags that exist, so a plain re-run can't recover).
  publish-tag:
    name: Publish existing tag to npm
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build
        env:
          PUSHTO_CORE_URL: ${{ secrets.PUSHTO_CORE_URL }}

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/chrome-extension/package.json').version")
          if [ "v${PKG_VERSION}" != "${{ inputs.tag }}" ]; then
            echo "Tag ${{ inputs.tag }} does not match package version v${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Publish
        run: cd packages/chrome-extension && npm publish --access public
